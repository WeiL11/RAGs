<svg viewBox="0 0 740 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Gooaye RAG system structure and where costs occur</title>
<desc>Two phases: build the library once (mostly free), then answer each question (Claude costs money per query).</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="740" height="400" fill="#ffffff"/>

<text x="20" y="26" font-size="15" font-weight="700" fill="#111827">1. Build the library — once, on your Mac</text>
<rect x="20" y="40" width="150" height="54" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="95" y="64" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">RSS feed</text>
<text x="95" y="81" text-anchor="middle" font-size="10" fill="#4b5563">671 episodes · free</text>
<line x1="172" y1="67" x2="208" y2="67" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="210" y="40" width="170" height="54" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="295" y="64" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Whisper ASR</text>
<text x="295" y="81" text-anchor="middle" font-size="10" fill="#4b5563">audio to text · local · FREE</text>
<line x1="382" y1="67" x2="418" y2="67" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="420" y="40" width="150" height="54" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="495" y="64" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Transcripts</text>
<text x="495" y="81" text-anchor="middle" font-size="10" fill="#4b5563">with timestamps · free</text>

<path d="M495 94 L495 116 L375 116 L375 134" fill="none" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M495 94 L495 116 L595 116 L595 134" fill="none" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="285" y="136" width="180" height="58" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="375" y="160" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Vector DB (Qdrant)</text>
<text x="375" y="178" text-anchor="middle" font-size="10" fill="#4b5563">local · embeddings ~cents</text>
<rect x="505" y="136" width="180" height="58" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
<text x="595" y="160" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Knowledge Graph</text>
<text x="595" y="178" text-anchor="middle" font-size="10" fill="#4b5563">Claude extraction · ~$2 once</text>

<line x1="20" y1="224" x2="720" y2="224" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4 4"/>
<text x="20" y="252" font-size="15" font-weight="700" fill="#111827">2. Answer a question — every time</text>

<rect x="20" y="268" width="120" height="54" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="80" y="292" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">Your question</text>
<text x="80" y="309" text-anchor="middle" font-size="10" fill="#4b5563">free</text>
<line x1="142" y1="295" x2="168" y2="295" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="170" y="268" width="135" height="54" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="237" y="292" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">Strategy</text>
<text x="237" y="309" text-anchor="middle" font-size="10" fill="#4b5563">agentic / graph / corrective</text>
<line x1="307" y1="295" x2="333" y2="295" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="335" y="268" width="135" height="54" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="402" y="292" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">Retrieve</text>
<text x="402" y="309" text-anchor="middle" font-size="10" fill="#4b5563">reads the library</text>
<line x1="472" y1="295" x2="498" y2="295" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="500" y="268" width="160" height="54" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
<text x="580" y="292" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">Claude → answer</text>
<text x="580" y="309" text-anchor="middle" font-size="10" fill="#4b5563">$ per question · optional</text>
<path d="M402 268 L402 200" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

<circle cx="26" cy="356" r="6" fill="#16a34a"/>
<text x="38" y="360" font-size="12" fill="#111827">Free (runs locally on your Mac)</text>
<circle cx="286" cy="356" r="6" fill="#d97706"/>
<text x="298" y="360" font-size="12" fill="#111827">Costs money (Claude API)</text>
</svg>
