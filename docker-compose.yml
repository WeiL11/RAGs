# Vector store for the RAG layer. Qdrant data persists under ./data/qdrant so the
# whole footprint stays in the repo's gitignored data dir.
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # REST
      - "6334:6334" # gRPC
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  # Optional — only needed if Graph RAG outgrows the networkx+SQLite store (M3).
